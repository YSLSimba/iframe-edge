<!doctype html>
<html lang="en">

<head>
  <script src="../theme-loader.js"></script>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests" />
  <title>Budget</title>
  <link rel="icon" href="https://stealthylabs.eu/logos/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="widget">

    <!-- Header -->
    <div class="mod-header">
      <div class="mod-icon">💰</div>
      <span class="mod-title" id="t-title">Budget</span>
      <div class="ctrl-btn" id="themeToggle" style="margin-left:auto">🌙</div>
      <div class="ctrl-btn" id="langToggle">FR</div>
    </div>

    <!-- Summary cards -->
    <div class="summary-row">
      <div class="summary-card">
        <div class="summary-label" id="t-balance">Solde</div>
        <div class="summary-value" id="val-balance">€0.00</div>
      </div>
      <div class="summary-card">
        <div class="summary-label" id="t-revenues">Revenus</div>
        <div class="summary-value income-color" id="val-income">+€0.00</div>
      </div>
      <div class="summary-card">
        <div class="summary-label" id="t-expenses">Dépenses</div>
        <div class="summary-value expense-color" id="val-expense">-€0.00</div>
      </div>
    </div>

    <!-- Month navigation -->
    <div class="month-nav">
      <button class="nav-arrow" id="btnPrev" aria-label="Previous month">&#8592;</button>
      <span id="monthLabel">— 2026</span>
      <button class="nav-arrow" id="btnNext" aria-label="Next month">&#8594;</button>
    </div>

    <!-- Add form -->
    <div class="add-form">
      <!-- Row 1: type toggle + amount -->
      <div class="form-row">
        <div class="type-toggle">
          <button class="type-btn active" id="btnExpense">
            <span id="t-expense-btn">Dépense</span>
          </button>
          <button class="type-btn" id="btnIncome">
            <span id="t-income-btn">Revenu</span>
          </button>
        </div>
        <input class="form-input" type="number" id="inputAmount" min="0" step="0.01" placeholder="Montant" />
      </div>
      <!-- Row 2: description + category + add button -->
      <div class="form-row">
        <input class="form-input" type="text" id="inputDesc" placeholder="Description…" maxlength="60" />
        <select class="form-select" id="selectCat"></select>
        <button class="btn-add" id="btnAdd" aria-label="Add transaction">+</button>
      </div>
      <!-- Row 3: recurring toggle (expense only) -->
      <div class="form-row" id="recurRow" style="display:none">
        <label class="recur-label" for="chkRecurring" id="recurLabel">
          <input type="checkbox" id="chkRecurring" />
          <span id="t-recurring">🔄 Abonnement mensuel</span>
        </label>
        <input class="form-input" type="number" id="inputDebitDay" min="1" max="31" placeholder="Jour (1-31)"
          style="display:none; max-width:100px" />
      </div>
    </div>

    <!-- Upcoming debits (visible only when subscriptions exist) -->
    <div class="subs-section" id="subsSection" style="display:none">
      <div class="subs-header">
        <span class="subs-header-icon">🔄</span>
        <span class="subs-header-label" id="t-next-debits">Prochains prélèvements</span>
        <span class="subs-total" id="subsTotal"></span>
      </div>
      <div class="subs-chips" id="subsChips"></div>
    </div>

    <!-- Transaction list -->
    <div class="txn-list" id="txnList"></div>

  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>

</html>
