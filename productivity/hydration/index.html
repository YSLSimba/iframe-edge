<!doctype html>
<html lang="en">

<head>
  <script src="../theme-loader.js"></script>
  <meta charset="UTF-8" />

  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests" />
  <title>Hydration</title>
  <link rel="icon" href="https://stealthylabs.eu/logos/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="widget">
    <div class="mod-header">
      <div class="mod-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />
        </svg>
      </div>
      <span class="mod-title" id="t-title">Hydration</span>
      <div class="lang-toggle" id="themeToggle" style="margin-left: auto">
        🌙
      </div>
      <div class="lang-toggle" id="langToggle">EN</div>
    </div>
    <div class="water-body">
      <div class="water-count-row">
        <div class="water-number" id="waterNum">0</div>
        <div class="water-meta" id="t-meta">/ 8 glasses · 2 L</div>
      </div>
      <div class="glass-grid" id="glassGrid"></div>
      <div class="water-status" id="waterStatus">Start hydrating!</div>
      <div class="water-controls">
        <button class="btn btn-ghost" id="waterMinus" aria-label="Remove a glass">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg></button><button class="btn btn-water" id="waterPlus" aria-label="Add a glass">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round">
            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />
          </svg>
          <span id="t-add">+1 glass</span>
        </button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>

</html>
