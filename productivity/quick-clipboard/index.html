<!doctype html>
<html lang="en">

<head>
    <script id="theme-loader">
        (function () {
            var t = localStorage.getItem("pa_theme") || "dark";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Clipboard</title>
    <link rel="icon" href="https://stealthylabs.eu/logos/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="widget">
        <div class="mod-header">
            <div class="mod-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </div>
            <span class="mod-title" id="t-title">Clipboard</span>
            <div class="lang-toggle" id="themeToggle" style="margin-left: auto">
                🌙
            </div>
            <div class="lang-toggle" id="langToggle">EN</div>
        </div>

        <div class="clip-body">
            <textarea class="clip-textarea" id="clipArea"
                placeholder="Paste links, scripts, or text here for quick access across your screen..."
                spellcheck="false"></textarea>
            <div class="clip-footer">
                <button class="btn-copy" id="copyBtn">
                    <svg style="margin-right: 6px" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    <span id="t-copy">Copy to Clipboard</span>
                </button>
                <button class="btn-clear" id="clearBtn" aria-label="Clear">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script>
        (() => {
            "use strict";
            const $ = (id) => document.getElementById(id);

            function showToast(msg, duration = 3000) {
                const el = $("toast");
                el.textContent = msg;
                el.classList.add("visible");
                clearTimeout(el._t);
                el._t = setTimeout(() => el.classList.remove("visible"), duration);
            }

            const THEME_KEY = "pa_theme";
            let currentTheme = localStorage.getItem(THEME_KEY) || "dark";

            function updateThemeUI() {
                $("themeToggle").textContent = currentTheme === "dark" ? "🌙" : "☀️";
                document.documentElement.setAttribute("data-theme", currentTheme);
            }

            $("themeToggle").addEventListener("click", () => {
                currentTheme = currentTheme === "dark" ? "light" : "dark";
                localStorage.setItem(THEME_KEY, currentTheme);
                updateThemeUI();
            });

            const LANG_KEY = "pa_lang";
            let currentLang = localStorage.getItem(LANG_KEY) || "fr";

            const i18n = {
                fr: {
                    title: "Presse-papiers",
                    placeholder:
                        "Collez vos liens, scripts ou commandes ici pour un accès rapide...",
                    btnCopy: "Copier le texte",
                    toastCopied: "✅ Copié dans le presse-papiers !",
                    toastEmpty: "⚠️ Rien à copier.",
                    toastCleared: "🗑️ Presse-papiers vidé.",
                },
                en: {
                    title: "Clipboard",
                    placeholder:
                        "Paste links, scripts, or text here for quick access...",
                    btnCopy: "Copy text",
                    toastCopied: "✅ Copied to clipboard!",
                    toastEmpty: "⚠️ Nothing to copy.",
                    toastCleared: "🗑️ Clipboard cleared.",
                },
            };

            function t(key) {
                return i18n[currentLang][key];
            }

            function updateLangUI() {
                $("langToggle").textContent = currentLang.toUpperCase();
                $("t-title").textContent = t("title");
                $("clipArea").placeholder = t("placeholder");
                $("t-copy").textContent = t("btnCopy");
            }

            $("langToggle").addEventListener("click", () => {
                currentLang = currentLang === "fr" ? "en" : "fr";
                localStorage.setItem(LANG_KEY, currentLang);
                updateLangUI();
            });

            window.addEventListener("storage", (e) => {
                if (e.key === THEME_KEY) {
                    currentTheme = e.newValue;
                    updateThemeUI();
                }
                if (e.key === LANG_KEY) {
                    currentLang = e.newValue;
                    updateLangUI();
                }
            });

            const CLIP_KEY = "pa_quickClipboard";
            let saveTimer = null;
            const clipArea = $("clipArea");

            clipArea.value = localStorage.getItem(CLIP_KEY) || "";

            clipArea.addEventListener("input", () => {
                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => {
                    localStorage.setItem(CLIP_KEY, clipArea.value);
                }, 300);
            });

            $("copyBtn").addEventListener("click", () => {
                const text = clipArea.value;
                if (!text.trim()) {
                    showToast(t("toastEmpty"));
                    return;
                }

                // Create a temporary off-screen textarea, write text, copy, remove.
                // This bypasses navigator.clipboard restrictions in the iCUE iframe.
                const tmp = document.createElement("textarea");
                tmp.value = text;
                tmp.style.position = "fixed";
                tmp.style.top = "-9999px";
                tmp.style.left = "-9999px";
                tmp.setAttribute("readonly", "");
                document.body.appendChild(tmp);
                tmp.focus();
                tmp.select();
                tmp.setSelectionRange(0, 99999);
                try {
                    const ok = document.execCommand("copy");
                    showToast(ok ? t("toastCopied") : "❌ Copie échouée.");
                } catch (e) {
                    showToast("❌ Copie échouée.");
                }
                document.body.removeChild(tmp);
            });

            $("clearBtn").addEventListener("click", () => {
                clipArea.value = "";
                localStorage.removeItem(CLIP_KEY);
                showToast(t("toastCleared"));
            });

            // Initialize Loop
            updateThemeUI();
            updateLangUI();
        })();
    </script>
</body>

</html>
