<!doctype html>
<html lang="en">
  <head>
        <script src="../theme-loader.js"></script>
    <meta charset="UTF-8" />
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests" />
    <title>Daily Focus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      button {
        cursor: pointer;
        font-family: inherit;
        border: none;
        background: none;
      }

      textarea {
        font-family: inherit;
      }

      :root,
      :root[data-theme="dark"] {
        --bg: #000000;
        --surface: #121212;
        --border: var(--overlay-8);
        --border-h: rgba(255, 255, 255, 0.15);
        --text-1: #ffffff;
        --text-2: #a0a0a0;
        --text-3: #666666;
        --accent: #a29bfe;
        /* soft purple */
        --tr: 0.18s cubic-bezier(0.4, 0, 0.2, 1);

        --overlay-2: rgba(255, 255, 255, 0.025);
        --overlay-3: rgba(255, 255, 255, 0.035);
        --overlay-5: rgba(255, 255, 255, 0.05);
        --overlay-8: rgba(255, 255, 255, 0.08);
        --overlay-10: rgba(255, 255, 255, 0.1);
        --toast-bg: #2c2c2c;
        --grid-overlay: rgba(0, 0, 0, 0.04);
      }

      :root[data-theme="light"] {
        --bg: #f5f5f7;
        --surface: #ffffff;
        --border: rgba(0, 0, 0, 0.08);
        --border-h: rgba(0, 0, 0, 0.15);
        --text-1: #1a1a1a;
        --text-2: #666666;
        --text-3: #999999;

        --overlay-2: rgba(0, 0, 0, 0.025);
        --overlay-3: rgba(0, 0, 0, 0.035);
        --overlay-5: rgba(0, 0, 0, 0.05);
        --overlay-8: rgba(0, 0, 0, 0.08);
        --overlay-10: rgba(0, 0, 0, 0.1);
        --toast-bg: #ffffff;
        --grid-overlay: rgba(0, 0, 0, 0.02);
      }

      html,
      body {
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text-1);
        font-family: "Inter", sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 3px,
          var(--grid-overlay) 3px,
          var(--grid-overlay) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }

      .widget {
        width: 100%;
        height: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px 22px 18px;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      .widget::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
        opacity: 0;
        transition: opacity var(--tr);
      }

      .widget:focus-within::before {
        opacity: 1;
      }

      .mod-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        flex-shrink: 0;
      }

      .mod-icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: rgba(162, 155, 254, 0.12);
        color: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .mod-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--text-2);
      }

      .lang-toggle {
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        color: var(--text-2);
        padding: 8px 12px;
        border-radius: 8px;
        background: var(--overlay-5);
        border: 1px solid var(--border);
        transition: all var(--tr);
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        min-height: 44px;
      }

      .lang-toggle:hover {
        background: var(--overlay-10);
        color: var(--text-1);
        border-color: var(--border-h);
      }

      .focus-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 0;
      }

      .focus-input {
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        color: var(--text-1);
        font-size: 42px;
        font-weight: 800;
        line-height: 1.2;
        text-align: center;
        resize: none;
        outline: none;
        transition: color var(--tr);
      }

      .focus-input::placeholder {
        color: var(--overlay-10);
      }

      .toast {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%) translateY(12px);
        background: var(--toast-bg);
        border: 1px solid var(--border-h);
        border-radius: 12px;
        padding: 9px 18px;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-1);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 1000;
        pointer-events: none;
        white-space: nowrap;
      }

      .toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .save-badge {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        font-weight: 500;
        color: var(--accent);
        letter-spacing: 0.5px;
        opacity: 0;
        transition: opacity 0.25s ease;
        display: flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
      }

      .save-badge.show {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div class="widget">
      <div class="mod-header">
        <div class="mod-icon">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
          >
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
        </div>
        <span class="mod-title" id="t-title">Daily Focus</span>
        <div class="lang-toggle" id="themeToggle" style="margin-left: auto">
          🌙
        </div>
        <div class="lang-toggle" id="langToggle">EN</div>
      </div>
      <div class="focus-body">
        <textarea
          class="focus-input"
          id="focusInput"
          placeholder="ONE GOAL TODAY"
          spellcheck="false"
        ></textarea>
        <span class="save-badge" id="saveBadge">
          <svg
            width="11"
            height="11"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
          <span id="t-saved">Saved</span>
        </span>
      </div>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
        <script src="./app.js"></script>
  </body>
</html>
