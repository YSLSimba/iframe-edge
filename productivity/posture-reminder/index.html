<!doctype html>
<html lang="en">

<head>
  <script src="../theme-loader.js"></script>
  <meta charset="UTF-8" />

  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests" />
  <title>Posture & Blink</title>
  <link rel="icon" href="https://stealthylabs.eu/logos/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="widget" id="widget">
    <div class="mod-header">
      <div class="mod-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
      </div>
      <span class="mod-title" id="t-title">Care</span>
      <div class="lang-toggle" id="themeToggle" style="margin-left: auto">
        🌙
      </div>
      <div class="lang-toggle" id="langToggle">EN</div>
    </div>

    <div class="reminder-body">
      <div class="time-display" id="timeDisplay">20:00</div>
      <div class="message-area" id="msgArea">Working...</div>
      <button class="action-btn" id="actionBtn">Reset</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>

</html>
