<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Auth — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100vh;
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #1DB954, #1aa34a);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 26px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 24px;
            background: #1DB954;
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.2s ease, transform 0.1s ease;
            letter-spacing: 0.3px;
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .error {
            background: rgba(255, 80, 80, 0.12);
            border: 1px solid rgba(255, 80, 80, 0.25);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 12px;
            color: #ff6b6b;
            margin-top: 16px;
            text-align: left;
        }

        .scope-list {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 24px;
            text-align: left;
        }

        .scope-list p {
            margin-bottom: 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .scope-list ul {
            list-style: none;
            margin-top: 8px;
        }

        .scope-list li {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.65);
            padding: 2px 0;
        }

        .scope-list li::before {
            content: "✓ ";
            color: #1DB954;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">♪</div>
        <h1>Connect to Spotify</h1>
        <p>You will be redirected to Spotify to authorize access. No passwords are stored — only a refresh token in your
            browser.</p>

        <div class="scope-list">
            <p>Permissions requested:</p>
            <ul>
                <li>Read currently playing track</li>
                <li>Read playback state</li>
                <li>Control playback (play/pause, skip)</li>
            </ul>
        </div>

        <button class="btn" id="authBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" />
            </svg>
            Authorize with Spotify
        </button>

        <div class="error" id="errorBox" style="display:none;"></div>
    </div>

    <script>
        (function () {
            'use strict';

            const REDIRECT_URI = 'https://stealthylabshq.github.io/iframe-edge/productivity/spotify-visualizer/auth/callback.html';
            const SCOPES = 'user-read-currently-playing user-read-playback-state user-modify-playback-state';

            function showError(msg) {
                const box = document.getElementById('errorBox');
                box.textContent = msg;
                box.style.display = 'block';
            }

            // Read client_id from URL query param
            const params = new URLSearchParams(window.location.search);
            const clientId = params.get('client_id');

            if (!clientId) {
                document.getElementById('authBtn').disabled = true;
                showError('Missing client_id parameter. Please re-open this page from the widget settings.');
            }

            // PKCE helpers
            function generateCodeVerifier(length) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
                const arr = new Uint8Array(length);
                crypto.getRandomValues(arr);
                return Array.from(arr).map(b => chars[b % chars.length]).join('');
            }

            async function generateCodeChallenge(verifier) {
                const encoded = new TextEncoder().encode(verifier);
                const hash = await crypto.subtle.digest('SHA-256', encoded);
                return btoa(String.fromCharCode(...new Uint8Array(hash)))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
            }

            document.getElementById('authBtn').addEventListener('click', async function () {
                if (!clientId) return;

                const verifier = generateCodeVerifier(128);
                const challenge = await generateCodeChallenge(verifier);

                // Store verifier for the callback page (same origin sessionStorage)
                sessionStorage.setItem('pkce_verifier', verifier);
                sessionStorage.setItem('pkce_client_id', clientId);

                const url = new URL('https://accounts.spotify.com/authorize');
                url.searchParams.set('response_type', 'code');
                url.searchParams.set('client_id', clientId);
                url.searchParams.set('scope', SCOPES);
                url.searchParams.set('redirect_uri', REDIRECT_URI);
                url.searchParams.set('code_challenge_method', 'S256');
                url.searchParams.set('code_challenge', challenge);
                url.searchParams.set('show_dialog', 'false');

                window.location.href = url.toString();
            });
        })();
    </script>
</body>

</html>
