<!doctype html>
<html lang="en">

<head>
    <script src="../theme-loader.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.spotify.com https://accounts.spotify.com https://lrclib.net; object-src 'none';" />
    <title>Spotify Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Reset ─────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
        }

        /* ── CSS Tokens ─────────────────────────────────────────── */
        :root,
        :root[data-theme="dark"] {
            --bg: #000000;
            --surface: #0d0d0d;
            --border: rgba(255, 255, 255, 0.08);
            --border-h: rgba(255, 255, 255, 0.15);
            --text-1: #ffffff;
            --text-2: #a0a0a0;
            --text-3: #555555;
            --accent: #1DB954;
            --accent-dim: rgba(29, 185, 84, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.55);
            --glass-b: rgba(255, 255, 255, 0.09);
            --toast-bg: #1c1c1c;
            --overlay-5: rgba(255, 255, 255, 0.05);
            --overlay-8: rgba(255, 255, 255, 0.08);
            --tr: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
        }

        :root[data-theme="light"] {
            --bg: #f0f0f2;
            --surface: #ffffff;
            --border: rgba(0, 0, 0, 0.07);
            --border-h: rgba(0, 0, 0, 0.14);
            --text-1: #0e0e0e;
            --text-2: #555555;
            --text-3: #999999;
            --accent: #1DB954;
            --accent-dim: rgba(29, 185, 84, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-b: rgba(0, 0, 0, 0.08);
            --toast-bg: #ffffff;
            --overlay-5: rgba(0, 0, 0, 0.05);
            --overlay-8: rgba(0, 0, 0, 0.08);
        }

        /* ── Base ───────────────────────────────────────────────── */
        html,
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text-1);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Dynamic blurred background ─────────────────────────── */
        #bgBlur {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        #bgBlur img {
            width: 110%;
            height: 110%;
            margin: -5%;
            object-fit: cover;
            filter: blur(40px) saturate(1.4);
            opacity: 0;
            transition: opacity 1.2s ease;
            pointer-events: none;
            user-select: none;
        }

        /* Dark overlay on top of blurred bg */
        #bgBlur::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.7));
            pointer-events: none;
        }

        /* ── Widget card (glassmorphism) ────────────────────────── */
        #widget {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(1.8);
            -webkit-backdrop-filter: blur(28px) saturate(1.8);
            border: 1px solid var(--glass-b);
            border-radius: 18px;
            overflow: hidden;
            transition: background var(--tr), border-color var(--tr);
        }

        /* ── Header ─────────────────────────────────────────────── */
        .hdr {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px 8px;
            flex-shrink: 0;
        }

        .hdr-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: var(--accent-dim);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .hdr-title {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-2);
            flex: 1;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            background: var(--overlay-5);
            border: 1px solid var(--border);
            color: var(--text-2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--tr);
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: var(--overlay-8);
            color: var(--text-1);
            border-color: var(--border-h);
        }

        /* ── Main content area ──────────────────────────────────── */
        #content {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 0 14px 14px;
            gap: 14px;
        }

        /* ── Left column (album + info + controls) ───────────────── */
        .col-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        /* ---- Album art ---- */
        .album-wrap {
            position: relative;
            flex-shrink: 0;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            transition: width var(--tr), height var(--tr);
        }

        .album-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .album-wrap .no-art {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--text-3);
        }

        /* Spinning vinyl overlay on playing */
        .vinyl-ring {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: 14px;
            background: radial-gradient(circle at 50% 50%,
                    transparent 28%, rgba(0, 0, 0, 0.3) 29%,
                    rgba(0, 0, 0, 0.1) 30%, transparent 31%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .is-playing .vinyl-ring {
            opacity: 1;
        }

        /* ---- Track info ---- */
        .track-info {
            width: 100%;
        }

        .track-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-1);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .track-artist {
            font-size: 11px;
            color: var(--text-2);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .track-album {
            font-size: 10px;
            color: var(--text-3);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        /* ---- Progress bar ---- */
        .progress-wrap {
            width: 100%;
        }

        .progress-bar {
            height: 3px;
            border-radius: 2px;
            background: var(--overlay-8);
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent);
            width: 0%;
            transition: width 1s linear;
            pointer-events: none;
        }

        .progress-times {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-3);
        }

        /* ---- Controls ---- */
        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--overlay-5);
            border: 1px solid var(--border);
            color: var(--text-2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--tr);
        }

        .ctrl-btn:hover {
            background: var(--overlay-8);
            color: var(--text-1);
            border-color: var(--border-h);
        }

        .ctrl-btn:active {
            transform: scale(0.93);
        }

        .ctrl-btn.play {
            width: 46px;
            height: 46px;
            border-radius: 13px;
            background: var(--accent);
            border-color: transparent;
            color: #000;
        }

        .ctrl-btn.play:hover {
            filter: brightness(1.1);
        }

        /* ── Right column (lyrics) ─────────────────────────────── */
        .col-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        .lyrics-header {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        #lyricsScroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--overlay-8) transparent;
            scroll-behavior: smooth;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
        }

        .lyric-line {
            font-size: 13px;
            line-height: 1.7;
            padding: 2px 0;
            color: var(--text-3);
            transition: color 0.3s ease, font-size 0.3s ease, font-weight 0.3s ease;
            cursor: default;
        }

        .lyric-line.active {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-1);
        }

        .lyric-line.near {
            color: var(--text-2);
            font-size: 14px;
        }

        .no-lyrics {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 8px;
            color: var(--text-3);
            font-size: 11px;
            text-align: center;
        }

        .no-lyrics .icon {
            font-size: 28px;
        }

        /* ── States: not-playing / no-token ─────────────────────── */
        #stateOverlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        #stateOverlay.hidden {
            display: none;
        }

        .state-icon {
            font-size: 32px;
        }

        .state-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-1);
        }

        .state-sub {
            font-size: 11px;
            color: var(--text-2);
            text-align: center;
            max-width: 180px;
            line-height: 1.5;
        }

        .state-btn {
            padding: 10px 20px;
            border-radius: 10px;
            background: var(--accent);
            color: #000;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            transition: filter var(--tr);
            border: none;
            cursor: pointer;
        }

        .state-btn:hover {
            filter: brightness(1.1);
        }

        /* ── Settings panel ─────────────────────────────────────── */
        #settingsPanel {
            position: absolute;
            inset: 0;
            z-index: 20;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            display: flex;
            flex-direction: column;
            padding: 16px;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #settingsPanel.open {
            transform: translateX(0);
        }

        .settings-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .settings-hdr h2 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-2);
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 10px 12px;
            background: var(--overlay-5);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text-1);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            outline: none;
            transition: border-color var(--tr);
        }

        .field input::placeholder {
            color: var(--text-3);
        }

        .field input:focus {
            border-color: var(--accent);
        }

        .field-hint {
            font-size: 10px;
            color: var(--text-3);
            margin-top: 5px;
            line-height: 1.5;
        }

        .auth-btn {
            width: 100%;
            padding: 11px;
            background: rgba(29, 185, 84, 0.12);
            border: 1px solid rgba(29, 185, 84, 0.3);
            border-radius: 9px;
            color: var(--accent);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            transition: all var(--tr);
            margin-bottom: 14px;
            cursor: pointer;
        }

        .auth-btn:hover {
            background: rgba(29, 185, 84, 0.2);
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            transition: filter var(--tr);
            cursor: pointer;
        }

        .save-btn:hover {
            filter: brightness(1.08);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 8px 0 14px;
        }

        /* ── Toast ──────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--toast-bg);
            border: 1px solid var(--border-h);
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-1);
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Responsive container queries ──────────────────────── */
        /* M  < 400px: only album art */
        /* L  400-799px: art + info + controls */
        /* XL ≥ 800px: art + info + controls + lyrics */

        /* Default (M): center everything, big album */
        .col-left {
            width: 100%;
            align-items: center;
            justify-content: center;
        }

        .track-info,
        .progress-wrap,
        .controls {
            display: none;
        }

        .col-right {
            display: none;
        }

        .album-wrap {
            width: min(75vw, 75vh, 180px);
            height: min(75vw, 75vh, 180px);
        }

        /* L: show info + controls */
        @media (min-width: 400px) {
            #content {
                flex-direction: column;
                align-items: center;
            }

            .col-left {
                width: 100%;
                flex-direction: row;
                align-items: center;
                gap: 14px;
            }

            .album-wrap {
                width: 80px;
                height: 80px;
                flex-shrink: 0;
            }

            .track-info,
            .progress-wrap,
            .controls {
                display: flex;
            }

            .track-info {
                flex-direction: column;
                flex: 1;
                min-width: 0;
            }

            .col-left {
                flex-direction: column;
                align-items: stretch;
            }

            /* Re-layout for L: row of album+info, then progress, then controls */
            .col-left-inner {
                display: flex;
                gap: 14px;
                align-items: center;
                width: 100%;
            }

            .col-right {
                display: none;
            }
        }

        /* XL: show lyrics column */
        @media (min-width: 800px) {
            #content {
                flex-direction: row;
            }

            .col-left {
                width: 280px;
                align-items: stretch;
                justify-content: flex-start;
            }

            .album-wrap {
                width: 100% !important;
                height: 240px !important;
            }

            .col-right {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <!-- Dynamic blurred background -->
    <div id="bgBlur"><img id="bgImg" alt="" aria-hidden="true" /></div>

    <!-- Main widget card -->
    <div id="widget">
        <!-- Header -->
        <div class="hdr">
            <div class="hdr-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" />
                </svg>
            </div>
            <span class="hdr-title" id="t-title">Spotify</span>
            <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">🌙</button>
            <button class="icon-btn" id="langToggle" aria-label="Toggle language"
                style="font-size:11px;font-weight:700;">FR</button>
            <button class="icon-btn" id="settingsToggle" aria-label="Settings">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
            </button>
        </div>

        <!-- Content -->
        <div id="content">
            <!-- Left column: album + info + controls -->
            <div class="col-left" id="colLeft">
                <div class="col-left-inner" id="colLeftInner">
                    <div class="album-wrap" id="albumWrap">
                        <div class="no-art" id="noArt">♪</div>
                        <img id="albumImg" src="" alt="Album art" style="display:none;" />
                        <div class="vinyl-ring" id="vinylRing"></div>
                    </div>
                    <div class="track-info" id="trackInfo">
                        <div class="track-name" id="trackName">—</div>
                        <div class="track-artist" id="trackArtist">—</div>
                        <div class="track-album" id="trackAlbum"></div>
                    </div>
                </div>

                <div class="progress-wrap" id="progressWrap">
                    <div class="progress-bar" id="progressBar" role="slider" aria-label="Track progress">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-times">
                        <span id="timeElapsed">0:00</span>
                        <span id="timeTotal">0:00</span>
                    </div>
                </div>

                <div class="controls" id="controls">
                    <button class="ctrl-btn" id="prevBtn" aria-label="Previous">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="19 20 9 12 19 4 19 20" />
                            <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                    <button class="ctrl-btn play" id="playBtn" aria-label="Play/Pause">
                        <svg id="playIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                    </button>
                    <button class="ctrl-btn" id="nextBtn" aria-label="Next">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 4 15 12 5 20 5 4" />
                            <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Right column: lyrics (XL only) -->
            <div class="col-right" id="colRight">
                <div class="lyrics-header" id="t-lyrics">Lyrics</div>
                <div id="lyricsScroll">
                    <div class="no-lyrics" id="noLyrics">
                        <div class="icon">🎵</div>
                        <div id="t-no-song">Play a song to see lyrics</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- State overlay (no config / not playing) -->
        <div id="stateOverlay">
            <div class="state-icon" id="stateIcon">⚙️</div>
            <div class="state-title" id="stateTitle">Setup Required</div>
            <div class="state-sub" id="stateSub">Open settings to add your Spotify Client ID and Refresh Token.</div>
            <button class="state-btn" id="stateAction" style="display:none;"></button>
        </div>

        <!-- Settings panel -->
        <div id="settingsPanel" role="dialog" aria-label="Settings">
            <div class="settings-hdr">
                <h2 id="t-settings">⚙️ Settings</h2>
                <button class="icon-btn" id="closeSettings" aria-label="Close">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>

            <div class="field">
                <label id="t-client-id">Spotify Client ID</label>
                <input type="text" id="inputClientId" placeholder="e.g. 4b2f8e1a3c6d..." autocomplete="off" />
                <div class="field-hint" id="t-client-hint">From your Spotify Developer Dashboard. See README for setup
                    guide.</div>
            </div>

            <button class="auth-btn" id="authBtn">🔑 <span id="t-auth-btn">Authorize &amp; get Refresh
                    Token</span></button>

            <div class="field">
                <label id="t-refresh-token">Refresh Token</label>
                <input type="password" id="inputRefreshToken" placeholder="Paste token from callback page…"
                    autocomplete="off" />
                <div class="field-hint" id="t-token-hint">After authorization, copy the token from the callback page and
                    paste it here.</div>
            </div>

            <div class="divider"></div>

            <button class="save-btn" id="saveBtn">Save</button>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
</body>

</html>
