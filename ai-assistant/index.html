<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <!-- connect-src includes https: to support user-configured proxy URLs -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://generativelanguage.googleapis.com https://api.anthropic.com https://api.openai.com https:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'self'; upgrade-insecure-requests; block-all-mixed-content;" />
    <script src="../productivity/theme-loader.js"></script>
    <title>AI Assistant</title>
    <link rel="icon" href="https://stealthylabs.eu/logos/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./css/widget.css" />
</head>

<body>
    <div id="widget">

        <!-- ── Header ─────────────────────────────────────────────── -->
        <div class="hdr">
            <button class="icon-btn" id="sidebarToggle" aria-label="Toggle history">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
            <div class="hdr-icon" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M7.5 13A2.5 2.5 0 0 0 5 15.5 2.5 2.5 0 0 0 7.5 18 2.5 2.5 0 0 0 10 15.5 2.5 2.5 0 0 0 7.5 13m9 0a2.5 2.5 0 0 0-2.5 2.5 2.5 2.5 0 0 0 2.5 2.5 2.5 2.5 0 0 0 2.5-2.5 2.5 2.5 0 0 0-2.5-2.5z" />
                </svg>
            </div>
            <span class="hdr-title" id="t-title">AI Assistant</span>
            <span class="model-badge" id="modelBadge" aria-live="polite"></span>

            <button class="icon-btn hdr-sep" id="newChatBtn" aria-label="New chat">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </button>
            <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">🌙</button>
            <button class="icon-btn" id="langToggle" aria-label="Toggle language">FR</button>
            <button class="icon-btn" id="settingsToggle" aria-label="Settings">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
            </button>
        </div>

        <!-- ── Main content ────────────────────────────────────────── -->
        <div id="content">

            <!-- Sidebar backdrop (tap outside to close on M/L) -->
            <div id="sidebarBackdrop"></div>

            <!-- Sidebar: conversation history -->
            <aside id="sidebar" aria-label="Conversation history">
                <div class="sidebar-hdr">
                    <span id="t-history"></span>
                    <button class="sidebar-new-btn" id="sidebarNewBtn" aria-label="New conversation">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                    </button>
                </div>
                <div id="historyList" role="list"></div>
            </aside>

            <!-- Chat area -->
            <div id="chatWrap">

                <!-- Setup overlay — no API key -->
                <div id="stateOverlay" class="hidden">
                    <div class="state-inner">
                        <div class="state-glow" aria-hidden="true"></div>
                        <div class="state-icon" id="stateIcon">🤖</div>
                        <div class="state-title" id="stateTitle">AI Assistant</div>
                        <div class="state-sub" id="stateSub"></div>
                        <button class="state-btn ui-hidden" id="stateAction"></button>
                    </div>
                </div>

                <!-- Welcome screen — key set but no messages -->
                <div id="welcomeWrap" class="hidden">
                    <div class="welcome-inner">
                        <div class="welcome-orb" aria-hidden="true"></div>
                        <div class="welcome-title" id="t-welcome-title"></div>
                        <div class="suggestions" id="suggestions" role="list">
                            <button class="suggestion-chip" data-prompt-key="s1" role="listitem"></button>
                            <button class="suggestion-chip" data-prompt-key="s2" role="listitem"></button>
                            <button class="suggestion-chip" data-prompt-key="s3" role="listitem"></button>
                            <button class="suggestion-chip" data-prompt-key="s4" role="listitem"></button>
                        </div>
                    </div>
                </div>

                <!-- Messages -->
                <div id="messagesWrap" role="log" aria-live="polite" aria-label="Conversation">
                    <div id="messages"></div>
                </div>

                <!-- Input bar -->
                <div id="inputWrap">
                    <div id="inputBar">
                        <textarea id="msgInput" rows="1" placeholder="Message…" aria-label="Message" autocomplete="off"
                            spellcheck="true"></textarea>
                        <button id="sendBtn" aria-label="Send message" title="Send (Enter)">
                            <svg id="sendIcon" width="15" height="15" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                            <svg id="stopIcon" class="ui-hidden" width="14" height="14" viewBox="0 0 24 24"
                                fill="currentColor">
                                <rect x="5" y="5" width="14" height="14" rx="2" />
                            </svg>
                        </button>
                    </div>
                    <div class="input-footer" id="inputFooter" aria-hidden="true"></div>
                </div>

            </div><!-- /chatWrap -->
        </div><!-- /content -->

        <!-- ── Settings panel ────────────────────────────────────── -->
        <div id="settingsPanel" role="dialog" aria-label="Settings" aria-modal="true">
            <div class="settings-hdr">
                <h2 id="t-settings"></h2>
                <button class="icon-btn" id="closeSettings" aria-label="Close settings">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>

            <!-- Provider tabs -->
            <div class="field">
                <label id="t-provider-lbl"></label>
                <div class="provider-tabs" role="group" aria-label="Provider selection">
                    <button class="provider-tab active" data-provider="gemini" id="tabGemini">
                        <svg class="provider-icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"
                            aria-hidden="true">
                            <path
                                d="M21.35 11.1H12.18v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z" />
                        </svg>Google
                    </button>
                    <button class="provider-tab" data-provider="claude" id="tabClaude">
                        <svg class="provider-icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"
                            fill-rule="evenodd" aria-hidden="true">
                            <path
                                d="M13.827 3.52h3.603L24 20h-3.603l-6.57-16.48zm-7.258 0h3.767L16.906 20h-3.674l-1.343-3.461H5.017l-1.344 3.46H0L6.57 3.522zm4.132 9.959L8.453 7.687 6.205 13.48H10.7z" />
                        </svg>Anthropic
                    </button>
                    <button class="provider-tab" data-provider="openai" id="tabOpenAI">
                        <svg class="provider-icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"
                            aria-hidden="true">
                            <path
                                d="M22.28 9.82a5.99 5.99 0 0 0-.52-4.91 6.05 6.05 0 0 0-6.51-2.9A6.07 6.07 0 0 0 4.98 4.18a5.99 5.99 0 0 0-4 2.9 6.05 6.05 0 0 0 .74 7.1 5.98 5.98 0 0 0 .51 4.91 6.05 6.05 0 0 0 6.52 2.9A6 6 0 0 0 13.26 24a6.06 6.06 0 0 0 5.77-4.21 5.99 5.99 0 0 0 4-2.9 6.06 6.06 0 0 0-.75-7.07zm-9.02 12.6a4.48 4.48 0 0 1-2.88-1.04l.14-.08 4.78-2.76a.8.8 0 0 0 .39-.68V11.7l2.02 1.17a.07.07 0 0 1 .04.05v5.58a4.51 4.51 0 0 1-4.49 4.51zM3.6 18.3a4.47 4.47 0 0 1-.54-3.01l.14.09 4.78 2.76a.77.77 0 0 0 .78 0l5.84-3.37v2.33a.08.08 0 0 1-.03.07L9.74 19.95A4.5 4.5 0 0 1 3.6 18.3zm-1.26-10.4a4.49 4.49 0 0 1 2.37-1.97v5.69a.77.77 0 0 0 .39.67l5.82 3.36-2.02 1.17a.08.08 0 0 1-.07 0L3.99 13.8A4.5 4.5 0 0 1 2.34 7.9zm16.6 3.86l-5.84-3.37 2.02-1.17a.08.08 0 0 1 .07 0l4.83 2.79a4.49 4.49 0 0 1-.68 8.1v-5.67a.79.79 0 0 0-.4-.68zm2.01-3.02l-.14-.09-4.77-2.75a.78.78 0 0 0-.79 0L9.41 9.23V6.9a.07.07 0 0 1 .03-.06l4.83-2.79a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.14L6.3 11.7a.08.08 0 0 1-.04-.06V6.08a4.5 4.5 0 0 1 7.38-3.45l-.14.08-4.78 2.76a.8.8 0 0 0-.39.68zm1.1-2.37 2.6-1.5 2.6 1.5v3l-2.6 1.5-2.6-1.5z" />
                        </svg>OpenAI
                    </button>
                </div>
            </div>

            <!-- Gemini fields -->
            <div class="provider-fields" id="fieldsGemini">
                <div class="field">
                    <label for="inputGeminiKey" id="t-gemini-key-lbl"></label>
                    <input type="password" id="inputGeminiKey" autocomplete="off" placeholder="AIza…" />
                    <div class="field-hint" id="t-gemini-key-hint">
                        <a href="https://aistudio.google.com/app/apikey" target="_blank"
                            rel="noopener noreferrer">Google AI Studio
                            &rarr; Get API key</a>
                    </div>
                </div>
                <div class="field">
                    <label for="selectGeminiModel" id="t-model-gemini-lbl"></label>
                    <select id="selectGeminiModel">
                        <!-- Gemini 3.x — latest generation -->
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
                        <option value="gemini-3-pro-preview">Gemini 3 Pro Preview</option>
                        <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                        <!-- Gemini 2.5 -->
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                        <option value="gemini-2.5-pro-preview-05-06">Gemini 2.5 Pro Preview</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                        <option value="gemini-2.5-flash-preview-04-17">Gemini 2.5 Flash Preview</option>
                        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
                        <!-- Gemini 2.0 -->
                        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                        <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash-Lite</option>
                        <!-- Aliases / Latest pointers -->
                        <option value="gemini-flash-latest">Gemini Flash Latest</option>
                        <option value="gemini-flash-lite-latest">Gemini Flash-Lite Latest</option>
                        <!-- Custom -->
                        <option value="__custom__">Custom…</option>
                    </select>
                    <input type="text" id="inputGeminiCustomModel" class="custom-model-input ui-hidden"
                        placeholder="e.g. gemini-exp-1206" autocomplete="off" spellcheck="false" />
                </div>
            </div>

            <!-- OpenAI fields -->
            <div class="provider-fields hidden" id="fieldsOpenAI">
                <div class="field">
                    <label for="inputOpenAIKey" id="t-openai-key-lbl"></label>
                    <input type="password" id="inputOpenAIKey" autocomplete="off" placeholder="sk-…" />
                    <div class="field-hint" id="t-openai-key-hint">
                        <a href="https://platform.openai.com/api-keys" target="_blank"
                            rel="noopener noreferrer">platform.openai.com &rarr; API Keys</a>
                    </div>
                </div>
                <div class="field">
                    <label for="selectOpenAIModel" id="t-model-openai-lbl"></label>
                    <select id="selectOpenAIModel">
                        <optgroup label="GPT-5">
                            <option value="gpt-5.1">GPT-5.1</option>
                            <option value="gpt-5-mini">GPT-5 Mini</option>
                            <option value="gpt-5-nano">GPT-5 Nano</option>
                        </optgroup>
                        <optgroup label="GPT-4.1">
                            <option value="gpt-4.1">GPT-4.1</option>
                            <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
                            <option value="gpt-4.1-nano">GPT-4.1 Nano</option>
                        </optgroup>
                        <optgroup label="GPT-4o">
                            <option value="gpt-4o" selected>GPT-4o</option>
                            <option value="gpt-4o-mini">GPT-4o Mini</option>
                        </optgroup>
                        <optgroup label="Reasoning">
                            <option value="o3">o3</option>
                            <option value="o4-mini">o4-mini</option>
                        </optgroup>
                        <optgroup label="Other">
                            <option value="__custom__">Custom…</option>
                        </optgroup>
                    </select>
                    <input type="text" id="inputOpenAICustomModel" class="custom-model-input ui-hidden"
                        placeholder="e.g. gpt-4-turbo" autocomplete="off" spellcheck="false" />
                </div>
            </div>

            <!-- Claude fields -->
            <div class="provider-fields hidden" id="fieldsClaude">
                <div class="field">
                    <label for="inputClaudeKey" id="t-claude-key-lbl"></label>
                    <input type="password" id="inputClaudeKey" autocomplete="off" placeholder="sk-ant-…" />
                    <div class="field-hint" id="t-claude-key-hint">
                        <a href="https://console.anthropic.com/settings/keys" target="_blank"
                            rel="noopener noreferrer">console.anthropic.com &rarr; API Keys</a>
                    </div>
                </div>
                <div class="field">
                    <label for="selectClaudeModel" id="t-model-claude-lbl"></label>
                    <select id="selectClaudeModel">
                        <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
                        <option value="claude-opus-4-6">Claude Opus 4.6</option>
                        <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
                        <option value="__custom__">Custom…</option>
                    </select>
                    <input type="text" id="inputClaudeCustomModel" class="custom-model-input ui-hidden"
                        placeholder="e.g. claude-3-opus-20240229" autocomplete="off" spellcheck="false" />
                </div>
                <div class="field">
                    <label for="inputProxyUrl" id="t-proxy-lbl">
                        <span id="t-proxy-lbl-text"></span> <span class="badge-optional" id="t-optional"></span>
                    </label>
                    <input type="url" id="inputProxyUrl" autocomplete="off"
                        placeholder="https://my-proxy.example.com" />
                    <div class="field-hint" id="t-proxy-hint"></div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- System prompt -->
            <div class="field">
                <label for="inputSystem" id="t-system-lbl">
                    <span id="t-system-lbl-text"></span> <span class="badge-optional" id="t-optional-2"></span>
                </label>
                <textarea id="inputSystem" rows="3" autocomplete="off" placeholder=""></textarea>
            </div>

            <button class="save-btn" id="saveBtn">
                <span id="t-save"></span>
            </button>

            <div class="divider"></div>

            <button class="danger-btn" id="clearHistoryBtn">
                <span id="t-clear"></span>
            </button>
        </div>

    </div><!-- /widget -->

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
</body>

</html>
